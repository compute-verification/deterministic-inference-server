<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Attested task graph — viewer</title>
<style>
  :root {
    --bg: #0f1218;
    --panel: #161a23;
    --panel-2: #1c2230;
    --line: #2a3042;
    --text: #d8dde8;
    --muted: #8a92a6;
    --accent: #6cc5ff;
    --accent-2: #9ad3ff;
    --pass: #5cd391;
    --fail: #ff7676;
    --warn: #f4c869;
    --research: #5e8df0;
    --deployment: #d97aff;
    --external: #f5b75a;
    --task-fill: #2a3247;
    --tap-line: #f4c869;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.45 -apple-system, "SF Mono", "Menlo", "Consolas", monospace;
  }
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 18px; border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  header h1 {
    font-size: 16px; margin: 0; font-weight: 600;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
  }
  header .badge {
    padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 600;
  }
  header select {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); padding: 4px 8px;
    border-radius: 4px; font: inherit;
  }
  .badge.pass { background: rgba(92,211,145,0.15); color: var(--pass); border: 1px solid rgba(92,211,145,0.3); }
  .badge.fail { background: rgba(255,118,118,0.15); color: var(--fail); border: 1px solid rgba(255,118,118,0.3); }
  .badge.warn { background: rgba(244,200,105,0.15); color: var(--warn); border: 1px solid rgba(244,200,105,0.3); }
  .meta {
    display: flex; gap: 14px; padding: 8px 18px;
    background: var(--panel-2); border-bottom: 1px solid var(--line);
    font-size: 12px; color: var(--muted);
  }
  .meta span b { color: var(--text); font-weight: 500; }
  main {
    display: grid; grid-template-columns: 1fr 460px;
    height: calc(100vh - 100px); overflow: hidden;
  }
  #graph-area { position: relative; overflow: auto; background: var(--bg); }
  #graph-svg { display: block; }
  #panel {
    border-left: 1px solid var(--line); background: var(--panel);
    overflow-y: auto; padding: 16px 18px;
  }
  #panel h2 {
    font-size: 14px; margin: 16px 0 6px;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    color: var(--accent); font-weight: 600;
  }
  #panel h2:first-child { margin-top: 0; }
  #panel .question {
    margin: 10px 0 4px; font-size: 12px; color: var(--muted);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
  }
  #panel .answer {
    background: var(--panel-2); padding: 8px 10px;
    border-left: 3px solid var(--line); border-radius: 2px;
    font-size: 12.5px; word-break: break-word;
  }
  #panel .answer.ok { border-left-color: var(--pass); }
  #panel .answer.bad { border-left-color: var(--fail); }
  #panel .answer.na { border-left-color: var(--muted); color: var(--muted); }
  #panel kbd {
    background: rgba(108,197,255,0.12); color: var(--accent-2);
    padding: 1px 5px; border-radius: 3px; font-size: 11.5px;
  }
  #panel .kv { display: flex; gap: 6px; padding: 1px 0; }
  #panel .kv .k { color: var(--muted); min-width: 110px; }
  #panel .kv .v { color: var(--text); }
  #panel .picker-hint {
    color: var(--muted); font-style: italic; margin-top: 40px; text-align: center;
  }
  /* graph node visuals */
  .node-artifact { cursor: pointer; }
  .node-artifact circle { fill: var(--panel-2); stroke: var(--muted); stroke-width: 1.5; transition: all 120ms; }
  .node-artifact.external circle { fill: rgba(245,183,90,0.15); stroke: var(--external); }
  .node-artifact.selected circle { stroke: var(--accent); stroke-width: 3; fill: rgba(108,197,255,0.18); }
  .node-artifact.flagged circle { stroke: var(--fail); stroke-width: 2.5; fill: rgba(255,118,118,0.10); }
  .node-artifact text { fill: var(--text); font-size: 11px; pointer-events: none; }
  .node-artifact:hover circle { stroke: var(--accent-2); }
  .node-task rect {
    fill: var(--task-fill); stroke: var(--line); stroke-width: 1.5; rx: 6; ry: 6;
  }
  .node-task.research rect { stroke: var(--research); }
  .node-task.deployment rect { stroke: var(--deployment); }
  .node-task text { fill: var(--text); font-size: 11px; pointer-events: none; text-anchor: middle; }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; opacity: 0.85; }
  .edge.input { stroke: var(--accent); opacity: 0.55; }
  .edge.output { stroke: var(--muted); opacity: 0.55; }
  .edge.tap { stroke: var(--tap-line); stroke-width: 2; stroke-dasharray: 4 3; opacity: 0.8; }
  .edge-label { fill: var(--muted); font-size: 10px; }
  .legend {
    position: absolute; top: 10px; right: 10px;
    background: var(--panel); padding: 8px 12px; border-radius: 4px;
    border: 1px solid var(--line); font-size: 11.5px; line-height: 1.6;
    color: var(--muted);
  }
  .legend .swatch { display: inline-block; width: 10px; height: 10px; margin-right: 4px; vertical-align: middle; border-radius: 50%; }
  .legend .sw-rect { display: inline-block; width: 14px; height: 8px; margin-right: 4px; vertical-align: middle; border-radius: 2px; }
  .legend .sw-line { display: inline-block; width: 16px; height: 2px; margin-right: 4px; vertical-align: middle; }
  .checks-list { font-size: 12px; max-height: 180px; overflow-y: auto; }
  .checks-list .row { display: flex; gap: 8px; padding: 2px 0; }
  .checks-list .row .name { flex: 1; }
  .checks-list .row .stat { min-width: 50px; text-align: right; }
  .checks-list .row.pass .stat { color: var(--pass); }
  .checks-list .row.fail .stat { color: var(--fail); }
  .checks-list .row.skip .stat { color: var(--warn); }
  details { margin-top: 8px; }
  details summary {
    cursor: pointer; color: var(--muted); font-size: 12px;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
  }
</style>
</head>
<body>
<header>
  <h1>Attested task graph — viewer</h1>
  <select id="scenario-picker"></select>
  <div id="verdict-badge" class="badge"></div>
  <div id="expected-fail" style="font-size:12px;color:var(--muted);"></div>
  <div style="flex:1;"></div>
  <div style="font-size:11px;color:var(--muted);">click any artifact (●) to inspect</div>
</header>
<div class="meta" id="meta-row"></div>
<main>
  <div id="graph-area">
    <div class="legend">
      <div><span class="swatch" style="background:var(--external);"></span>external artifact</div>
      <div><span class="swatch" style="background:var(--panel-2);border:1px solid var(--muted);"></span>derived artifact</div>
      <div><span class="sw-rect" style="background:var(--task-fill);border:1px solid var(--research);"></span>task (research)</div>
      <div><span class="sw-rect" style="background:var(--task-fill);border:1px solid var(--deployment);"></span>task (deployment)</div>
      <div><span class="sw-line" style="background:var(--tap-line);"></span>network tap (signed)</div>
    </div>
    <svg id="graph-svg"></svg>
  </div>
  <aside id="panel">
    <div class="picker-hint">click any artifact in the graph to see how it is accounted for</div>
  </aside>
</main>
<script>
const BUNDLE = __BUNDLE_JSON__;

let currentScenarioName = null;
let currentArtifactId = null;

const picker = document.getElementById("scenario-picker");
for (const s of BUNDLE.scenarios) {
  const opt = document.createElement("option");
  opt.value = s.scenario_name;
  opt.textContent = s.scenario_name + (s.expected_failure ? " — expects " + s.expected_failure : "");
  picker.appendChild(opt);
}
picker.addEventListener("change", () => switchScenario(picker.value));

function scenarioByName(name) {
  return BUNDLE.scenarios.find(s => s.scenario_name === name);
}

function flaggedArtifactIds(scenario) {
  // Heuristic: which artifacts are likely "the bad one" for the chosen scenario?
  // For graph_log_consistency or replay_correctness mismatches, identify
  // them by per-artifact panel state. The viewer just highlights — the
  // validator's verdict is the source of truth.
  const out = new Set();
  for (const [aid, a] of Object.entries(scenario.artifact_panels)) {
    if (a.replay && a.replay.applies && a.replay.matches === false) out.add(aid);
    if (a.graph_log && a.graph_log.applies && a.graph_log.matches === false) out.add(aid);
    for (const ps of (a.policies || [])) {
      if (ps.verdict === "violation") out.add(aid);
    }
  }
  return out;
}

function switchScenario(name) {
  currentScenarioName = name;
  picker.value = name;
  const scenario = scenarioByName(name);
  renderHeader(scenario);
  renderGraph(scenario);
  // Re-select the same artifact id if it exists in the new scenario, else
  // clear the panel so we don't show stale data.
  if (currentArtifactId && scenario.artifact_panels[currentArtifactId]) {
    selectArtifact(currentArtifactId);
  } else {
    currentArtifactId = null;
    document.getElementById("panel").innerHTML =
      '<div class="picker-hint">click any artifact in the graph to see how it is accounted for</div>';
  }
}

function renderHeader(scenario) {
  const v = scenario.verdict || {};
  const badge = document.getElementById("verdict-badge");
  if (v.verdict === "pass") {
    badge.className = "badge pass";
    badge.textContent = "VERDICT: PASS";
  } else {
    badge.className = "badge fail";
    badge.textContent = "VERDICT: FAIL";
  }
  const ef = document.getElementById("expected-fail");
  if (scenario.expected_failure) {
    ef.textContent = "(expected fail at: " + scenario.expected_failure + ")";
  } else {
    ef.textContent = "(honest run — should pass all 15 checks)";
  }

  const m = scenario.graph_meta;
  document.getElementById("meta-row").innerHTML = `
    <span>run_id <b>${escapeHtml(m.run_id)}</b></span>
    <span>pods <b>${m.n_pods}</b></span>
    <span>tasks <b>${m.n_tasks}</b></span>
    <span>artifacts <b>${m.n_artifacts}</b></span>
    <span>transmissions <b>${m.n_transmissions}</b></span>
    <span>taps <b>${m.n_taps}</b></span>
    <span>log <b>${escapeHtml(m.log_id)}</b> · tree size <b>${m.tree_size}</b></span>
    <span>policies <b>${m.policies.length}</b></span>
  `;
}

function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s)
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#39;");
}

function renderGraph(scenario) {
  const svg = document.getElementById("graph-svg");
  svg.innerHTML = "";
  // Compute viewbox.
  const xs = scenario.nodes.map(n => n.x);
  const ys = scenario.nodes.map(n => n.y);
  const W = Math.max(...xs, 200) + 100;
  const H = Math.max(...ys, 200) + 100;
  svg.setAttribute("width", W);
  svg.setAttribute("height", H);
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

  const nodeMap = {};
  for (const n of scenario.nodes) {
    nodeMap[n.kind + ":" + n.id] = n;
  }

  // Producer/consumer edges.
  const edgeLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
  for (const e of scenario.edges) {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) continue;
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    const dx = (b.x - a.x) * 0.5;
    path.setAttribute("d",
      `M ${a.x} ${a.y + (a.kind === "task" ? 22 : 18)} ` +
      `C ${a.x} ${a.y + 60}, ${b.x} ${b.y - 60}, ${b.x} ${b.y - (b.kind === "task" ? 22 : 18)}`
    );
    path.setAttribute("class", "edge " + e.kind);
    edgeLayer.appendChild(path);
  }
  svg.appendChild(edgeLayer);

  // Tap-overlay: draw a dashed gold curve between sender pod's task and
  // receiver pod's task, labeled with tap_id and seq.
  // Heuristic: pick the sender's last task and receiver's first task.
  const tasksByPod = {};
  for (const n of scenario.nodes) {
    if (n.kind !== "task") continue;
    // Map pod via task id pattern "pod_X:tN" — simple convention used by sim.
    const podId = n.id.split(":")[0];
    (tasksByPod[podId] = tasksByPod[podId] || []).push(n);
  }
  for (const t of scenario.transmissions) {
    const senderTasks = tasksByPod[t.sender] || [];
    const receiverTasks = tasksByPod[t.receiver] || [];
    if (!senderTasks.length || !receiverTasks.length) continue;
    const a = senderTasks[senderTasks.length - 1];
    const b = receiverTasks[0];
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    // Bow the tap curve out to the right so it doesn't sit on top of the
    // straight producer→artifact→consumer edges in the same column.
    const bowX = (a.x + b.x) / 2 + 90;
    const bowY = (a.y + b.y) / 2;
    path.setAttribute("d",
      `M ${a.x} ${a.y + 22} ` +
      `Q ${bowX} ${bowY}, ${b.x} ${b.y - 22}`);
    path.setAttribute("class", "edge tap");
    edgeLayer.appendChild(path);
    // Place label up near the sender so it sits above the artifact row.
    const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
    label.setAttribute("class", "edge-label");
    label.setAttribute("x", a.x + (bowX - a.x) * 0.45);
    label.setAttribute("y", a.y + 36 + (bowY - a.y) * 0.15);
    label.textContent = `${t.tap_id} #${t.tap_seq}`;
    edgeLayer.appendChild(label);
  }

  const flagged = flaggedArtifactIds(scenario);

  // Nodes.
  for (const n of scenario.nodes) {
    if (n.kind === "task") {
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      g.setAttribute("class", "node-task " + (nodeMap["task:" + n.id] ? findPartition(scenario, n.id) : ""));
      g.setAttribute("transform", `translate(${n.x}, ${n.y})`);
      const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      rect.setAttribute("x", -70); rect.setAttribute("y", -22);
      rect.setAttribute("width", 140); rect.setAttribute("height", 44);
      g.appendChild(rect);
      const lines = n.label.split("\n");
      lines.forEach((line, i) => {
        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.setAttribute("x", 0);
        t.setAttribute("y", -4 + i * 14);
        t.textContent = line;
        g.appendChild(t);
      });
      svg.appendChild(g);
    } else {
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      g.setAttribute("class", "node-artifact" + (n.external ? " external" : "")
        + (flagged.has(n.id) ? " flagged" : ""));
      g.setAttribute("transform", `translate(${n.x}, ${n.y})`);
      g.dataset.aid = n.id;
      const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      c.setAttribute("r", 18);
      g.appendChild(c);
      const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t.setAttribute("text-anchor", "middle");
      t.setAttribute("y", 32);
      t.textContent = n.id.length > 22 ? n.id.slice(0, 20) + "…" : n.id;
      g.appendChild(t);
      g.addEventListener("click", () => selectArtifact(n.id));
      svg.appendChild(g);
    }
  }
}

function findPartition(scenario, taskId) {
  // We can fish the partition out of artifact_panels' producer field,
  // since producer.partition is included for the task's outputs.
  for (const p of Object.values(scenario.artifact_panels)) {
    if (p.producer && p.producer.task_id === taskId) return p.producer.partition || "";
  }
  return "";
}

function selectArtifact(aid) {
  currentArtifactId = aid;
  // Update node selection visuals.
  document.querySelectorAll(".node-artifact").forEach(g => g.classList.remove("selected"));
  document.querySelectorAll(`.node-artifact[data-aid="${cssEscape(aid)}"]`).forEach(g => g.classList.add("selected"));

  const scenario = scenarioByName(currentScenarioName);
  const a = scenario.artifact_panels[aid];
  if (!a) return;
  document.getElementById("panel").innerHTML = renderArtifact(scenario, a);
}

function cssEscape(s) { return s.replace(/(["\\])/g, "\\$1"); }

function renderArtifact(scenario, a) {
  const sections = [];
  // Header
  sections.push(`
    <h2>${escapeHtml(a.id)}</h2>
    <div class="kv"><span class="k">commitment</span><span class="v"><kbd>${escapeHtml(a.commitment_short)}</kbd></span></div>
    <div class="kv"><span class="k">size</span><span class="v">${a.size} bytes</span></div>
    <div class="kv"><span class="k">external</span><span class="v">${a.external ? "yes (source)" : "no (derived)"}</span></div>
    <div class="kv"><span class="k">cumulative ancestry compute</span><span class="v">${a.cumulative_flops} flops</span></div>
  `);

  // Q1
  sections.push(`<div class="question">Q1. What task produced it?</div>`);
  if (a.external) {
    sections.push(`<div class="answer na">none — this is an external (source) artifact</div>`);
  } else if (!a.producer) {
    sections.push(`<div class="answer bad">no producer task declared</div>`);
  } else {
    const p = a.producer;
    const sigs = (p.reviewer_signatures || []).map(s => s.reviewer_id).join(", ");
    sections.push(`<div class="answer ok">
      <kbd>${escapeHtml(p.task_id)}</kbd> on pod <kbd>${escapeHtml(p.pod_id)}</kbd>
      (partition <kbd>${escapeHtml(p.partition)}</kbd>)<br>
      operation <kbd>${escapeHtml(p.operation)}</kbd>
      params ${escapeHtml(JSON.stringify(p.operation_params))}<br>
      claimed flops ${p.claimed_flops}, interval ${JSON.stringify(p.interval_ms)} ms
      ${sigs ? `<br>reviewer signatures: <kbd>${escapeHtml(sigs)}</kbd>` : ""}
    </div>`);
  }

  // Q2
  sections.push(`<div class="question">Q2. What artifacts did that task depend on?</div>`);
  if (a.external) {
    sections.push(`<div class="answer na">— (no producer)</div>`);
  } else if (!a.inputs.length) {
    sections.push(`<div class="answer">no inputs</div>`);
  } else {
    const rows = a.inputs.map(i =>
      `<div class="kv"><span class="k">${i.external ? "ext" : "art"}</span>
       <span class="v"><kbd>${escapeHtml(i.artifact_id)}</kbd>
       — ${escapeHtml(i.commitment_short)} · ${i.size} B</span></div>`
    ).join("");
    sections.push(`<div class="answer ok">${rows}</div>`);
  }

  // Q3, Q4 — transmissions
  sections.push(`<div class="question">Q3. Was it transmitted over the simulated network?</div>`);
  if (!a.transmissions.length) {
    sections.push(`<div class="answer na">no — terminal or never crossed a tap</div>`);
  } else {
    sections.push(`<div class="answer ok">yes, ${a.transmissions.length} transmission${a.transmissions.length > 1 ? "s" : ""}</div>`);
  }

  sections.push(`<div class="question">Q4. Which tap observed the transmission?</div>`);
  if (!a.transmissions.length) {
    sections.push(`<div class="answer na">— (no transmission)</div>`);
  } else {
    const rows = a.transmissions.map(ev => `
      <div style="margin-bottom:6px;">
        <div class="kv"><span class="k">tap_id</span><span class="v"><kbd>${escapeHtml(ev.tap_id)}</kbd> seq ${ev.tap_seq}</span></div>
        <div class="kv"><span class="k">sender → receiver</span><span class="v"><kbd>${escapeHtml(ev.sender)}</kbd> → <kbd>${escapeHtml(ev.receiver)}</kbd></span></div>
        <div class="kv"><span class="k">timestamp</span><span class="v">${ev.timestamp_ms} ms</span></div>
        <div class="kv"><span class="k">tap signature</span><span class="v"><kbd>${escapeHtml(ev.tap_signature_short)}</kbd></span></div>
      </div>
    `).join("");
    sections.push(`<div class="answer ok">${rows}</div>`);
  }

  // Q5 — log inclusion
  sections.push(`<div class="question">Q5. Is the tap event included in the transparency log?</div>`);
  if (!a.transmissions.length) {
    sections.push(`<div class="answer na">— (no transmission to include)</div>`);
  } else {
    const rows = a.transmissions.map(ev => {
      const ok = ev.inclusion_verified;
      return `<div class="kv"><span class="k">leaf #${ev.leaf_index}</span>
        <span class="v">${ok ? "✓ inclusion proof verifies against signed root" : "✗ inclusion proof FAILED"}</span></div>`;
    }).join("");
    const cls = a.transmissions.every(ev => ev.inclusion_verified) ? "ok" : "bad";
    sections.push(`<div class="answer ${cls}">${rows}<br>
      log root: <kbd>${escapeHtml(scenario.log_status.root_short)}</kbd>
      ${scenario.log_status.root_match ? "(recomputed root matches)" : "<span style='color:var(--fail)'>(root MISMATCH)</span>"}
    </div>`);
  }

  // Q6 — graph/log match
  sections.push(`<div class="question">Q6. Did the graph's claim match the logged event?</div>`);
  if (!a.graph_log.applies) {
    sections.push(`<div class="answer na">— (no transmission to compare)</div>`);
  } else if (a.graph_log.matches) {
    sections.push(`<div class="answer ok">yes — commitment and size in artifact entry match the signed transmission(s)</div>`);
  } else {
    sections.push(`<div class="answer bad">NO mismatches:<br>${a.graph_log.mismatches.map(escapeHtml).join("<br>")}</div>`);
  }

  // Q7 — replay
  sections.push(`<div class="question">Q7. Can the orchestrator rerun the producing task and reproduce the commitment?</div>`);
  if (!a.replay.applies) {
    sections.push(`<div class="answer na">producer task <kbd>${a.producer ? escapeHtml(a.producer.task_id) : "—"}</kbd> not in this run's replay sample (sample = ${scenario.replay_responses.map(r => r.task_id).join(", ") || "∅"})</div>`);
  } else if (a.replay.matches) {
    sections.push(`<div class="answer ok">yes — orchestrator reran <kbd>${escapeHtml(a.replay.task_id)}</kbd>; recomputed commitment <kbd>${escapeHtml(a.replay.recomputed_short)}</kbd> matches declared</div>`);
  } else {
    sections.push(`<div class="answer bad">NO — recomputed <kbd>${escapeHtml(a.replay.recomputed_short)}</kbd> does NOT match declared <kbd>${escapeHtml(a.commitment_short)}</kbd></div>`);
  }

  // Q8 — policies
  sections.push(`<div class="question">Q8. Did the artifact and its producing task satisfy the toy policies?</div>`);
  if (!a.policies.length) {
    sections.push(`<div class="answer na">no policies relevant to this artifact</div>`);
  } else {
    const rows = a.policies.map(p => {
      const cls = p.verdict === "violation" ? "bad" :
                  (p.verdict === "satisfied" || p.verdict === "ok") ? "ok" : "na";
      return `<div class="answer ${cls}" style="margin-bottom:4px;">
        <kbd>${escapeHtml(p.kind)}</kbd> — ${escapeHtml(p.verdict)}<br>
        <span style="color:var(--muted);">${escapeHtml(p.detail)}</span>
      </div>`;
    }).join("");
    sections.push(rows);
  }

  // Footer: per-scenario validator checks expandable.
  const checks = (scenario.verdict && scenario.verdict.checks) || [];
  if (checks.length) {
    const rows = checks.map(c => `
      <div class="row ${c.status}">
        <span class="name">${escapeHtml(c.check)}</span>
        <span class="stat">${c.status.toUpperCase()}</span>
      </div>
    `).join("");
    const fail = scenario.verdict.first_failure ? `<div style="color:var(--fail);font-size:12px;margin-top:6px;">first failure: ${escapeHtml(scenario.verdict.first_failure)}</div>` : "";
    sections.push(`
      <details>
        <summary>show all 15 validator checks for this scenario</summary>
        <div class="checks-list">${rows}</div>
        ${fail}
      </details>
    `);
  }

  // Log/STH details (consistency proofs)
  const ls = scenario.log_status;
  const consRows = (ls.consistency || []).map(c => `
    <div class="kv"><span class="k">size ${c.from_size} → ${c.to_size}</span>
    <span class="v">${c.verified ? "✓ consistent" : "✗ NOT consistent"} (old root <kbd>${escapeHtml(c.old_root_short || "")}</kbd>)</span></div>
  `).join("");
  const prevRows = (ls.previous_sths || []).map(p => `
    <div class="kv"><span class="k">prev STH</span>
    <span class="v">tree size ${p.tree_size}, root <kbd>${escapeHtml(p.root_short)}</kbd></span></div>
  `).join("");
  if (ls.previous_sths.length || ls.consistency.length) {
    sections.push(`
      <details>
        <summary>append-only log proof material</summary>
        <div style="margin-top:6px;">
          ${prevRows}
          ${consRows}
        </div>
      </details>
    `);
  }

  return sections.join("\n");
}

if (BUNDLE.scenarios.length) {
  const honest = BUNDLE.scenarios.find(s => s.scenario_name === "honest") || BUNDLE.scenarios[0];
  switchScenario(honest.scenario_name);
}
</script>
